name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $VERSION = "${{ github.ref_name }}".TrimStart("v")
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT

      - name: Build exe
        run: pyinstaller "FH6 Sniper.spec"

      - name: Build installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            /DMyAppVersion="${{ steps.version.outputs.VERSION }}" `
            installer\installer.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FH6_Sniper_Installer_v${{ steps.version.outputs.VERSION }}
          path: installer/Output/FH6_Sniper_Installer_v${{ steps.version.outputs.VERSION }}.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: FH6 Sniper v${{ steps.version.outputs.VERSION }}
          files: installer/Output/FH6_Sniper_Installer_v${{ steps.version.outputs.VERSION }}.exe
          generate_release_notes: true
          draft: false
          prerelease: false
